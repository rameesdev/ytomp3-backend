version: '3.8'

services:
  # MongoDB Database Service
  mongodb:
    image: mongo:6.0
    container_name: ytmp3-mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  # Redis Service for BullMQ
  redis:
    image: redis:7-alpine
    container_name: ytmp3-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  # Express HTTP Web Server
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: ytmp3-web-server
    restart: always
    expose:
      - "3000"
    environment:
      - PORT=3000
      - MONGODB_URI=mongodb://mongodb:27017/ytomp3
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - APP_URL=https://ytomp3.cc
    depends_on:
      - mongodb
      - redis
    volumes:
      - shared-uploads:/app/uploads
      - shared-sitemaps:/app/public/sitemaps
      - shared-public-root:/app/public

  # BullMQ Background Worker Node
  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: ytmp3-queue-worker
    restart: always
    command: npm run worker
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/ytomp3
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - mongodb
      - redis
    volumes:
      - shared-uploads:/app/uploads
      - shared-sitemaps:/app/public/sitemaps

  # Nginx High-Performance Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: ytmp3-nginx-proxy
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - shared-public-root:/usr/share/nginx/html/public:ro
      - shared-uploads:/usr/share/nginx/html/uploads:ro
      - shared-sitemaps:/usr/share/nginx/html/public/sitemaps:ro
    depends_on:
      - web

volumes:
  mongo-data:
  redis-data:
  shared-uploads:
  shared-sitemaps:
  shared-public-root:
